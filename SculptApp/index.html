<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCULPT — AI Fitness & Nutrition Trainer</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SCULPT">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/5c4bc4/ffffff?text=S">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0f;
            --deep-navy: #0d1240;
            --mid-violet: #5c4bc4;
            --accent-pink: #d94fc4;
            --text-primary: #f0ecff;
            --surface-1: rgba(45, 27, 105, 0.4);
            --border: rgba(156, 143, 212, 0.25);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--black);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .onb-step {
            display: none;
            flex-direction: column;
            width: 90%; max-width: 400px;
            margin-top: 50px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .onb-step.active { display: flex; }

        .input-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #9b8fd4; }

        .input {
            width: 100%; padding: 12px;
            background: var(--surface-1);
            border: 1px solid var(--mid-violet);
            border-radius: 8px; color: white;
            box-sizing: border-box;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        .btn-primary {
            background: linear-gradient(90deg, #5c4bc4, #d94fc4);
            color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 16px; margin-top: 10px;
        }

        /* Chat UI */
        #chat-container {
            display: none; width: 90%; max-width: 400px;
            flex-direction: column; height: 85vh;
        }

        #chat-box {
            flex-grow: 1; overflow-y: auto;
            padding: 15px; background: var(--surface-1);
            border-radius: 12px; margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .msg { margin-bottom: 12px; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user-msg { background: var(--mid-violet); align-self: flex-end; margin-left: auto; color: white; }
        .ai-msg { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border: 1px solid var(--border); }

        .chat-input-area { display: flex; gap: 8px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="onb-step active" id="onb-step-1">
        <h1 style="text-align:center; font-family:'Outfit'; font-size: 42px; margin-bottom: 10px;">SCULPT</h1>
        <p style="text-align:center; color: #9b8fd4; margin-bottom: 30px;">Setting up your AI profile...</p>
        
        <div class="input-group">
            <label>Full Name</label>
            <input class="input" id="inp-name" placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label>Age</label>
            <input class="input" id="inp-age" type="number" placeholder="e.g. 36">
        </div>
        <div class="input-group">
            <label>Gender</label>
            <select class="input" id="inp-gender">
                <option value="Female">Female</option>
                <option value="Male">Male</option>
                <option value="Non-binary">Non-binary</option>
            </select>
        </div>
        <button class="btn-primary" onclick="onbNext(1)">Continue →</button>
    </div>

    <div class="onb-step" id="onb-step-2">
        <h2 style="font-family:'Outfit'">Physical Metrics</h2>
        <p style="color: #9b8fd4;">This helps the AI calculate your needs.</p>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input class="input" id="inp-weight" type="number" placeholder="e.g. 52">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input class="input" id="inp-height" type="number" placeholder="e.g. 160">
        </div>
        <button class="btn-primary" onclick="onbNext(2)">Initialize AI Coach →</button>
    </div>

    <div id="chat-container" class="onb-step">
        <h2 style="font-family:'Outfit'; margin-bottom: 5px;">SCULPT AI Coach</h2>
        <div id="chat-box" style="display: flex; flex-direction: column;">
            <div class="msg ai-msg">Welcome! I've loaded your profile. Ask me for a workout routine or nutrition advice tailored to you.</div>
        </div>
        <div class="chat-input-area">
            <input class="input" id="chat-input" placeholder="Message your coach...">
            <button class
