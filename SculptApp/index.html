<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCULPT — AI Fitness & Nutrition Trainer</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SCULPT">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0f;
            --mid-violet: #5c4bc4;
            --accent-pink: #d94fc4;
            --text-primary: #f0ecff;
            --surface-1: rgba(45, 27, 105, 0.4);
            --border: rgba(156, 143, 212, 0.25);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--black);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .onb-step {
            display: none;
            flex-direction: column;
            width: 90%; max-width: 400px;
            margin-top: 40px;
        }

        .onb-step.active { display: flex; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #9b8fd4; text-transform: uppercase; }

        .input {
            width: 100%; padding: 14px;
            background: var(--surface-1);
            border: 1px solid var(--mid-violet);
            border-radius: 10px; color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #5c4bc4, #d94fc4);
            color: white; border: none; padding: 16px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 16px; margin-top: 10px;
        }

        #chat-box {
            flex-grow: 1; overflow-y: auto;
            padding: 15px; background: var(--surface-1);
            border-radius: 12px; margin-bottom: 15px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            height: 450px;
        }
        .msg { margin-bottom: 12px; padding: 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; max-width: 85%; }
        .user-msg { background: var(--mid-violet); align-self: flex-end; color: white; }
        .ai-msg { background: rgba(255, 255, 255, 0.08); align-self: flex-start; border: 1px solid var(--border); }
        .chat-input-area { display: flex; gap: 8px; padding-bottom: 30px; width: 100%; }
    </style>
</head>
<body>

    <div class="onb-step active" id="onb-step-1">
        <h1 style="text-align:center; font-family:'Outfit'; font-size: 48px;">SCULPT</h1>
        <div class="input-group">
            <label>Name</label>
            <input class="input" id="inp-name" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Age</label>
            <input class="input" id="inp-age" type="number" placeholder="36">
        </div>
        <div class="input-group">
            <label>Gender</label>
            <select class="input" id="inp-gender">
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
        </div>
        <button class="btn-primary" onclick="onbNext(1)">Continue →</button>
    </div>

    <div class="onb-step" id="onb-step-2">
        <h2 style="font-family:'Outfit'">Body Metrics</h2>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input class="input" id="inp-weight" type="number" placeholder="52">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input class="input" id="inp-height" type="number" placeholder="160">
        </div>
        <button class="btn-primary" onclick="onbNext(2)">Initialize Coach →</button>
    </div>

    <div class="onb-step" id="chat-container">
        <h2 style="font-family:'Outfit'; margin-bottom: 10px;">Coach SCULPT</h2>
        <div id="chat-box">
            <div class="msg ai-msg">Waiting for connection...</div>
        </div>
        <div class="chat-input-area">
            <input class="input" id="chat-input" placeholder="Ask your coach...">
            <button class="btn-primary" style="margin-top:0; padding: 0 20px;" onclick="sendMessage()">↑</button>
        </div>
    </div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // Update with your latest API Key from Google AI Studio
    const API_KEY = "AIzaSyAewnjgOzUqwHc5fPwI9-bKOQ8cimZQROI"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    // MODEL NAME FIX: Added "-latest" suffix to resolve 404
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

    let userData = { name: "", age: "", gender: "", weight: "", height: "" };

    window.onbNext = function(step) {
        const current = document.getElementById('onb-step-' + step);
        const next = (step === 2) ? document.getElementById('chat-container') : document.getElementById('onb-step-' + (step + 1));

        if (step === 1) {
            userData.name = document.getElementById('inp-name').value;
            userData.age = document.getElementById('inp-age').value;
            userData.gender = document.getElementById('inp-gender').value;
        } else if (step === 2) {
            userData.weight = document.getElementById('inp-weight').value;
            userData.height = document.getElementById('inp-height').value;
            const box = document.getElementById('chat-box');
            box.innerHTML = `<div class="msg ai-msg">Ready for you, ${userData.name}. Ask me anything about your routine.</div>`;
        }

        current.style.display = 'none';
        next.style.display = 'flex';
        next.classList.add('active');
        window.scrollTo(0,0);
    };

    window.sendMessage = async function() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const context = `Context: Client is a ${userData.age}yo ${userData.gender}, ${userData.weight}kg. Request: ${text}`;
            const result = await model.generateContent(context);
            const response = await result.response;
            
            box.innerHTML += `<div class="msg ai-msg">${response.text()}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (e) {
            console.error(e);
            box.innerHTML += `<div class="msg ai-msg" style="color:#ffbcbc; border: 1px solid #ff4d4d;">
                <b>API Error:</b> ${e.message}<br><br>
                <i>Tip: If 404 persists, edit line 124 to use "gemini-pro" instead of "gemini-1.5-flash-latest".</i>
            </div>`;
        }
    };
</script>

</body>
</html>
